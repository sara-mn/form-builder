<div class="flex align-items-center justify-content-start">
    <p-fieldset legend="Login">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col">
            <div class="card flex flex-col gap-4">
                <div class="flex flex-col gap-2">
                    <label for="email">Email: </label>
                    <input id="email" type="email" pInputText formControlName="email" autocomplete="username" />
                </div>
                <div class="flex flex-col gap-2">
                    <label for="password">Password: </label>
                    <p-password inputId="password" id="password" formControlName="password" [feedback]="false"
                        [toggleMask]="true" autocomplete="current-password" />
                </div>
                <div class="flex flex-col gap-2">
                    <p-button type="submit" label="Login" [disabled]="form.invalid" />
                </div>
            </div>
        </form>
    </p-fieldset>
</div>
